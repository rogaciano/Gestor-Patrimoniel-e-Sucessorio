{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="max-w-5xl">
    <div class="glass-panel rounded-[32px] p-8 sm:p-10">
        <p class="section-kicker">Ativo</p>
        <h1 class="mini-title mt-3">Cadastro de {{ tipo|title }}</h1>
        <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600">
            Propriedade vinculada a {{ pessoa.nome_completo }}. Preencha dados de aquisição, valor de mercado e classificação jurídica.
        </p>
        <form class="mt-8" method="POST">
            {% include 'partials/form_generic.html' %}
        </form>
    </div>
</section>

<script src="{% static 'js/fipe.js' %}"></script>
{% endblock %}
