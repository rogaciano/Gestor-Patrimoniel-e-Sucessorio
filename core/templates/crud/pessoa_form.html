{% extends 'base.html' %}

{% block content %}
<section class="max-w-4xl">
    <div class="glass-panel rounded-[32px] p-8 sm:p-10">
        <p class="section-kicker">Pessoa</p>
        <h1 class="mini-title mt-3">Cadastro de membro</h1>
        <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600">
            Registre dados civis, vínculos familiares e informações patrimoniais relacionadas a {{ familia.nome }}.
        </p>
        <form class="mt-8" method="POST" enctype="multipart/form-data">
            {% include 'partials/form_generic.html' %}
        </form>
    </div>
</section>
{% endblock %}
