{% extends 'base.html' %}

{% block content %}
<div class="bg-white shadow sm:rounded-lg">
    <div class="px-4 py-5 sm:p-6">
        <h3 class="text-lg leading-6 font-medium text-gray-900">
            Adicionar Ativo à Holding
        </h3>
        <div class="mt-2 max-w-xl text-sm text-gray-500">
            <p>Escolha o tipo de ativo para {{ holding.razao_social }}</p>
        </div>

        <div class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2">
            <a href="{% url 'ativo_create_holding' holding.id 'imovel' %}"
                class="relative rounded-lg border border-gray-300 bg-white px-6 py-5 shadow-sm flex items-center space-x-3 hover:border-gray-400 focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                <div class="flex-shrink-0">
                    <span class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
                        🏠
                    </span>
                </div>
                <div class="flex-1 min-w-0">
                    <span class="absolute inset-0" aria-hidden="true"></span>
                    <p class="text-sm font-medium text-gray-900">Imóvel</p>
                    <p class="text-sm text-gray-500">Casas, Apartamentos, Terrenos</p>
                </div>
            </a>

            <a href="{% url 'ativo_create_holding' holding.id 'veiculo' %}"
                class="relative rounded-lg border border-gray-300 bg-white px-6 py-5 shadow-sm flex items-center space-x-3 hover:border-gray-400 focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                <div class="flex-shrink-0">
                    <span class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                        🚗
                    </span>
                </div>
                <div class="flex-1 min-w-0">
                    <span class="absolute inset-0" aria-hidden="true"></span>
                    <p class="text-sm font-medium text-gray-900">Veículo</p>
                    <p class="text-sm text-gray-500">Carros, Motos, Embarcações</p>
                </div>
            </a>

            <a href="{% url 'ativo_create_holding' holding.id 'empresa' %}"
                class="relative rounded-lg border border-gray-300 bg-white px-6 py-5 shadow-sm flex items-center space-x-3 hover:border-gray-400 focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                <div class="flex-shrink-0">
                    <span class="h-10 w-10 rounded-full bg-green-100 flex items-center justify-center text-green-600">
                        🏢
                    </span>
                </div>
                <div class="flex-1 min-w-0">
                    <span class="absolute inset-0" aria-hidden="true"></span>
                    <p class="text-sm font-medium text-gray-900">Empresa</p>
                    <p class="text-sm text-gray-500">Quotas, Ações Ltda/SA</p>
                </div>
            </a>

            <a href="{% url 'ativo_create_holding' holding.id 'investimento' %}"
                class="relative rounded-lg border border-gray-300 bg-white px-6 py-5 shadow-sm flex items-center space-x-3 hover:border-gray-400 focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                <div class="flex-shrink-0">
                    <span class="h-10 w-10 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600">
                        📈
                    </span>
                </div>
                <div class="flex-1 min-w-0">
                    <span class="absolute inset-0" aria-hidden="true"></span>
                    <p class="text-sm font-medium text-gray-900">Investimento</p>
                    <p class="text-sm text-gray-500">CDB, FIIs, Tesouro</p>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
