{% extends 'base.html' %}

{% block content %}
<section class="max-w-4xl">
    <div class="glass-panel rounded-[32px] p-8 sm:p-10">
        <p class="section-kicker">Cadastro</p>
        <h1 class="mini-title mt-3">{{ title|default:"Cadastro de Família" }}</h1>
        <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600">
            Abra um novo dossiê familiar ou ajuste o nome do caso para manter a carteira organizada.

        <form class="mt-8" method="POST">

    </div>
</section>
{% endblock %}
